name: Sync gitprofile-deps

on:
  workflow_dispatch: # run manually after bumping gitprofile version in package.json

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install repo deps (fetches gitprofile source into node_modules)
        run: npm install

      - name: Generate gitprofile package-lock.json
        working-directory: node_modules/@arifszn/gitprofile
        run: npm install --package-lock-only

      - name: Copy gitprofile package.json and package-lock.json to gitprofile-deps
        run: |
          mkdir -p gitprofile-deps
          cp node_modules/@arifszn/gitprofile/package.json gitprofile-deps/package.json
          cp node_modules/@arifszn/gitprofile/package-lock.json gitprofile-deps/package-lock.json

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add gitprofile-deps/package.json gitprofile-deps/package-lock.json
          git commit -m "chore: sync gitprofile-deps from @arifszn/gitprofile" || echo "No changes to commit"
          git push
