name: Deploy Portfolio

on:
  push:
    branches: [ "main" ] # Triggers on each Push to the main-Branch
  workflow_dispatch: # allow manual start over the GitHub-Interface

# needed Rights for GitHub Pages Deployment
permissions:
  contents: read
  pages: write
  id-token: write

# block concurrency Deployments
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install your repo deps (installs gitprofile source into node_modules)
        run: npm install

      - name: Install gitprofile dependencies
        run: cd node_modules/@arifszn/gitprofile && npm install

      - name: Inject your config into gitprofile
        run: cp gitprofile.config.ts node_modules/@arifszn/gitprofile/gitprofile.config.ts

      - name: Build gitprofile
        run: cd node_modules/@arifszn/gitprofile && npm run build

      - name: Copy dist output to repo root
        run: cp -r node_modules/@arifszn/gitprofile/dist ./dist

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
