name: Deploy Portfolio

on:
  push:
    branches: [ "main" ] # Triggers on each Push to the main-Branch
  workflow_dispatch: # allow manual start over the GitHub-Interface

# needed Rights for GitHub Pages Deployment
permissions:
  contents: read
  pages: write
  id-token: write

# block concurrency Deployments
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

